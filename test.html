<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Image XY Position Finder</title>

<style>
body{
  font-family: Arial;
  background:#111;
  color:white;
  text-align:center;
}

#container{
  margin-top:20px;
  position:relative;
  display:inline-block;
}

#img{
  max-width:90vw;
  border:2px solid #444;
}

#marker{
  position:absolute;
  width:10px;
  height:10px;
  background:red;
  border-radius:50%;
  transform:translate(-50%,-50%);
  pointer-events:none;
}

#info{
  margin-top:15px;
  font-size:18px;
}
</style>
</head>

<body>

<h2>Image XY Position Finder</h2>

<input type="file" id="upload">

<div id="container">
  <img id="img">
  <div id="marker"></div>
</div>

<div id="info">
Click on the image
</div>

<script>
const upload = document.getElementById("upload");
const img = document.getElementById("img");
const marker = document.getElementById("marker");
const info = document.getElementById("info");

upload.onchange = e => {
  const file = e.target.files[0];
  img.src = URL.createObjectURL(file);
};

img.onclick = e => {

  const rect = img.getBoundingClientRect();

  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;

  const normX = (x / rect.width).toFixed(3);
  const normY = (y / rect.height).toFixed(3);

  marker.style.left = x + "px";
  marker.style.top = y + "px";

  info.innerHTML = `
  Pixel X: ${Math.round(x)} <br>
  Pixel Y: ${Math.round(y)} <br><br>
  Normalized X: ${normX} <br>
  Normalized Y: ${normY}
  `;
};
</script>

</body>
</html>
